<meta charset="UTF-8">
<title>Estoque da Loja</title>
</head>

<body>

<h1>Estoque da Loja</h1>

<ul id="lista"></ul>

<script>

fetch("https://estoque-4cb33-default-rtdb.firebaseio.com/Lsc.json")
.then(response => response.json())
.then(data => {

let lista = document.getElementById("lista");

for (let categoria in data) {

let titulo = document.createElement("h2");
titulo.innerText = categoria;
titulo.style.color = "#B81111";

lista.appendChild(titulo);

for (let produto in data[categoria]) {

let item = document.createElement("li");

item.innerText = produto + " : " + data[categoria][produto];

lista.appendChild(item);

}

}

});

</script>
</body>
</html>
