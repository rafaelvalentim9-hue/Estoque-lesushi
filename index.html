<!DOCTYPE html>
<html>
<head>

  </style>
  body {
background-image: url("fundo.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

li {
font-size: 30px;
margin: 10px 0;
color: white;
}

h1{
color:white;
}
</style>
    
  
<meta charset="UTF-8">
<title>Estoque da Loja</title>
</head>

<body>

<h1>Estoque da Loja</h1>

<ul id="lista"></ul>

<script>

fetch("https://estoque-4cb33-default-rtdb.firebaseio.com/Lsc.json")
.then(response => response.json())
.then(data => {

let lista = document.getElementById("lista");

for (let produto in data) {

let item = document.createElement("li");

item.innerText = produto + " : " + data[produto];

lista.appendChild(item);

}

});

</script>

</body>
</html>
